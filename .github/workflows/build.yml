name: build

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  HUGO_VERSION: "0.162.1"

jobs:
  hugo:
    name: hugo build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build site
        run: hugo --gc --minify
