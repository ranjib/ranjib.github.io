{{ define "main" }}
<article>
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <p class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      {{ if .ReadingTime }}<span>·</span><span>{{ .ReadingTime }} min read</span>{{ end }}
    </p>
  </header>
  <div class="post-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
